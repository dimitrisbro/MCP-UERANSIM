apiVersion: v1
kind: Pod
metadata:
  name: gnb-example
  namespace: ueransim
  labels:
    app: ueransim
    type: gnb
spec:
  containers:
    - name: gnb
      image: ghcr.io/dimitrisbro/mcp-ueransim/ueransim-gnb:latest
      imagePullPolicy: IfNotPresent
      command: ["tail", "-f", "/dev/null"]
      securityContext:
        capabilities:
          add: ["NET_ADMIN"]
